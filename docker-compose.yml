version: '3.8'

services:

  db:
    image: postgres:15-alpine
    container_name: medipassport-db
    environment:
      POSTGRES_DB: medipassport
      POSTGRES_USER: mediuser
      POSTGRES_PASSWORD: medipass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: medipassport-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=medipassport-secret-key-2024
      - JWT_SECRET_KEY=medipassport-jwt-secret-2024
      - DATABASE_URL=postgresql://mediuser:medipass123@db:5432/medipassport
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
      - AWS_REGION=${AWS_REGION}
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: medipassport-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: